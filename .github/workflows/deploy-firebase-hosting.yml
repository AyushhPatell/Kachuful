name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run logic tests
        run: npm run test:logic

      - name: Build app
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting (live)
        run: npx firebase-tools deploy --only hosting --project kachuful-70077 --non-interactive

      - name: Deploy Firestore rules (optional)
        continue-on-error: true
        run: npx firebase-tools deploy --only firestore:rules --project kachuful-70077 --non-interactive
